[tool.poetry]
name = "novelaist"
version = "0.1.0"
description = "Aplicación de escritura de novelas con IA local"
authors = ["Tu Nombre <tu.correo@ejemplo.com>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.8"
ollama = "^0.1.0"
ebooklib = "^0.18"
reportlab = "^4.0"
pillow = "^9.0"

[tool.poetry.dev-dependencies]
pytest = "^7.0"
black = "^23.0"
flake8 = "^6.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"